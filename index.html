<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Desi Nomad builds AI chatbots trained specifically on your travel business — so your website answers queries, captures leads, and books trips at 3am.">
<title>Desi Nomad — AI Chatbots for Travel Companies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0A0A0F;
  --ink2: #12121A;
  --ink3: #1C1C28;
  --saffron: #FF9500;
  --saffron2: #FFB340;
  --teal: #00C9A7;
  --teal2: #00A88C;
  --text: #F0EDE8;
  --muted: rgba(240,237,232,0.5);
  --border: rgba(240,237,232,0.08);
  --card: rgba(255,255,255,0.04);
  --card-hover: rgba(255,255,255,0.07);
  --radius: 16px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--ink); color: var(--text); overflow-x: hidden; line-height: 1.6; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--ink); }
::-webkit-scrollbar-thumb { background: var(--saffron); border-radius: 2px; }

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 18px 6%;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(10,10,15,0.8); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.logo { font-family: 'Playfair Display', serif; font-size: 22px; font-style: italic; color: var(--text); text-decoration: none; }
.logo em { color: var(--saffron); font-style: normal; }
.nav-links { display: flex; align-items: center; gap: 32px; }
.nav-links a { font-size: 13px; font-weight: 500; color: var(--muted); text-decoration: none; transition: color 0.2s; letter-spacing: 0.02em; }
.nav-links a:hover { color: var(--text); }
.nav-cta {
  background: var(--saffron); color: var(--ink) !important;
  padding: 10px 22px; border-radius: 100px;
  font-weight: 600 !important; font-size: 13px !important;
  transition: all 0.2s !important;
}
.nav-cta:hover { background: var(--saffron2) !important; transform: translateY(-1px); }

/* HERO */
.hero {
  min-height: 100vh;
  padding: 130px 6% 80px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; top: -200px; right: -200px;
  width: 700px; height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,149,0,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.hero::after {
  content: '';
  position: absolute; bottom: -100px; left: -100px;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,201,167,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--saffron); margin-bottom: 24px;
  opacity: 0; animation: up 0.7s 0.1s ease forwards;
}
.hero-eyebrow::before { content: ''; width: 28px; height: 1px; background: var(--saffron); }
h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(44px, 5.5vw, 72px);
  font-weight: 900; line-height: 1.05;
  letter-spacing: -1px;
  opacity: 0; animation: up 0.7s 0.2s ease forwards;
}
h1 em { color: var(--saffron); font-style: italic; }
.hero-sub {
  font-size: 17px; color: var(--muted); line-height: 1.75;
  font-weight: 300; max-width: 500px;
  margin: 24px 0 40px;
  opacity: 0; animation: up 0.7s 0.3s ease forwards;
}
.hero-btns {
  display: flex; gap: 12px; flex-wrap: wrap;
  opacity: 0; animation: up 0.7s 0.4s ease forwards;
}
.btn-p {
  background: var(--saffron); color: var(--ink);
  padding: 15px 30px; border-radius: 100px;
  font-size: 14px; font-weight: 600;
  text-decoration: none; transition: all 0.25s;
}
.btn-p:hover { background: var(--saffron2); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,149,0,0.3); }
.btn-s {
  background: transparent; color: var(--text);
  padding: 15px 30px; border-radius: 100px;
  font-size: 14px; font-weight: 500;
  text-decoration: none; border: 1px solid var(--border);
  transition: all 0.25s;
}
.btn-s:hover { border-color: var(--saffron); color: var(--saffron); }
.hero-stats {
  display: flex; gap: 36px; margin-top: 56px;
  padding-top: 36px; border-top: 1px solid var(--border);
  opacity: 0; animation: up 0.7s 0.5s ease forwards;
}
.stat-n { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700; color: var(--saffron); }
.stat-l { font-size: 12px; color: var(--muted); margin-top: 3px; font-weight: 500; }

/* CHAT MOCKUP */
.chat-mock {
  background: var(--ink2);
  border: 1px solid var(--border);
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 40px 100px rgba(0,0,0,0.5);
  opacity: 0; animation: up 0.8s 0.3s ease forwards;
  position: relative;
}
.chat-mock-header {
  padding: 16px 20px;
  background: var(--ink3);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.chat-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--saffron), var(--teal)); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.chat-title { font-size: 14px; font-weight: 600; }
.chat-status { font-size: 11px; color: var(--teal); display: flex; align-items: center; gap: 4px; }
.chat-status::before { content: ''; width: 6px; height: 6px; background: var(--teal); border-radius: 50%; }
.chat-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.chat-time { font-size: 10px; color: var(--muted); text-align: center; font-weight: 500; letter-spacing: 0.05em; }
.msg { max-width: 85%; }
.msg.u { align-self: flex-end; }
.msg.b { align-self: flex-start; }
.bubble {
  padding: 11px 16px; border-radius: 16px;
  font-size: 13px; line-height: 1.6;
}
.msg.u .bubble { background: var(--saffron); color: var(--ink); border-bottom-right-radius: 4px; font-weight: 500; }
.msg.b .bubble { background: var(--ink3); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
.lead-capture {
